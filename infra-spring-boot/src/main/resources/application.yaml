spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/card_db
    username: db_user
    password: db_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        formatsql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8002
# podman run -d --name card_postgres --network=host -e POSTGRES_DB=card_db -e POSTGRES_USER=db_user -e POSTGRES_PASSWORD=db_password -v postgres_data:/var/lib/postgresql/data docker.io/postgres:16-alpine